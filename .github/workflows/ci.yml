name: CI

# Camera-free CI for the PalletScan pipeline. Runs on windows-latest (the
# production target) with no hardware, no vendor SDKs, no Docker/cloud/GPU
# services — only pip-installable packages, per the InfoSec constraint.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push to the same ref cancels the previous run (saves runner minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the package floor (requires-python >=3.11); 3.13 is what
        # the factory box actually runs — both must stay green.
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev/zxing extras
        # pip-only; pulls pygrabber (win32) + comtypes transitively. No SDKs.
        # [zxing] is the DEPLOYED engine (config/station.yaml decode.engine:
        # zxing) — without it every zxing test importorskips and the production
        # decode path gets zero CI coverage. zxing-cpp ships prebuilt wheels,
        # so this stays compiler-free and camera-free.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,zxing]"

      - name: Type-check (mypy)
        # Non-blocking: the package carries pre-existing mypy findings in the
        # DirectShow source (untyped pygrabber/comtypes surface). Surface the
        # report without red-lining CI on issues outside this change.
        continue-on-error: true
        run: mypy palletscan tools

      - name: Run unit tests (camera-free)
        # Exclude the long-running synthetic acceptance gates and the soak
        # variants; those need a quiet machine, not a CI runner. Markers
        # `acceptance` and `soak_short` are registered in pyproject.toml;
        # `soak` is excluded defensively.
        run: pytest -m "not acceptance and not soak_short and not soak"
