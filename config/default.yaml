# PalletScan configuration. Every key is optional — an empty file runs the
# synthetic-mode defaults. Unknown keys are rejected.

source:
  type: synthetic

synthetic:
  width: 1280
  height: 720
  fps: 30.0
  seed: 42
  num_passes: 20
  speed_mph_range: [2.0, 10.0]
  angle_deg_range: [0.0, 35.0]
  # The two dimensionless ratios that govern decodability:
  # px/module (optics envelope at 3-15 ft) ...
  px_per_module_range: [3.0, 6.0]
  module_size_mm: 5.0
  # ... and blur-in-modules, derived from speed x exposure. 0.03 at 30 fps
  # is the ~1 ms locked global-shutter operating point; raise to stress.
  exposure_fraction: 0.03
  contrast_range: [0.45, 1.0]
  noise_sigma_range: [2.0, 8.0]
  lighting_gradient_max: 30.0
  occlusion_max_frac: 0.15
  symbologies: [qr, datamatrix]
  idle_s_range: [0.3, 1.5]
  realtime: false
  payload_prefix: "PLT-"

motion:
  algorithm: framediff   # framediff | mog2
  downscale_width: 160
  diff_threshold: 12
  min_area_frac: 0.01
  open_frames: 3   # a 1-frame blip makes 2 active diffs; 3 debounces it
  quiet_frames: 8
  roi_pad_px: 32

decode:
  symbology_priority: [qr, datamatrix]
  frame_budget_ms: 50.0
  dm_timeout_ms: 40
  executor: thread       # thread | process (see tools/bench_decoders.py)
  workers: 2
  fallback_after_frames: 4
  confirmations: 1

dedup:
  window_s: 12.0

buffer:
  pre_s: 2.0
  post_s: 2.0

evidence:
  dir: data/evidence
  frame_stride: 3
  jpeg_quality: 85
  max_total_mb: 500.0
  max_age_days: 14.0

sinks:
  console: {enabled: true}
  jsonl: {enabled: true, path: data/events.jsonl}
  sqlite: {enabled: true, path: data/palletscan.db}

logging:
  level: INFO
