# PalletScan configuration. Every key is optional — an empty file runs the
# synthetic-mode defaults. Unknown keys are rejected.

source:
  type: synthetic   # synthetic | video | camera
  camera: null      # cameras[].id to run; optional when exactly one entry

synthetic:
  width: 1280
  height: 720
  fps: 30.0
  seed: 42
  num_passes: 20
  speed_mph_range: [2.0, 10.0]
  angle_deg_range: [0.0, 35.0]
  # The two dimensionless ratios that govern decodability:
  # px/module (optics envelope at 3-15 ft) ...
  px_per_module_range: [3.0, 6.0]
  module_size_mm: 5.0
  # ... and blur-in-modules, derived from speed x exposure. 0.03 at 30 fps
  # is the ~1 ms locked global-shutter operating point; raise to stress.
  exposure_fraction: 0.03
  contrast_range: [0.45, 1.0]
  noise_sigma_range: [2.0, 8.0]
  lighting_gradient_max: 30.0
  occlusion_max_frac: 0.15
  symbologies: [qr, datamatrix]
  idle_s_range: [0.3, 1.5]
  realtime: false
  payload_prefix: "PLT-"

video:
  path: ""               # clip to replay when source.type is video
  fps_override: null     # set when the file's fps metadata is broken
  speed: 1.0             # wall-clock pacing only: 1.0 as-if-live, >1 faster, 0 unpaced
  loop: 1                # play count; 0 = loop forever (soak)

# Live cameras, identified by device-name substring (never bare index —
# indexes shuffle on replug). Lock entries with `palletscan calibrate --save`;
# exposure/gain are RAW backend values (DSHOW log2 stops vs MSMF semantics),
# stored next to the backend they were calibrated under.
cameras: []
#  - id: cam-color
#    name: "See3CAM_24CUG"        # device-name substring, case-insensitive
#    backend: auto                # auto | dshow | msmf | avfoundation
#    fourcc: UYVY                 # null = leave the device default
#    width: 1920
#    height: 1200
#    fps: 120.0
#    convert_rgb: true
#    fallback_index: null         # only when the platform yields no names
#    read_fail_limit: 5           # consecutive read failures before reconnect
#    connect_verify_s: 1.0        # achieved-fps sample per (re)connect; 0 disables
#    settings: {exposure_auto: false, exposure: -6, gain: 10, brightness: null}
#  - id: cam-mono
#    name: "See3CAM_37CUGM"
#    backend: auto
#    fourcc: GREY                 # Y8; probing may pick convert_rgb: false
#    width: 2064
#    height: 1552
#    fps: 72.0
#    settings: {exposure_auto: false, exposure: -6, gain: 10, brightness: null}

# Stall detection + reconnect for live cameras (synthetic/video unaffected).
# Never gives up by default: backoff caps at retry.cap_s forever; the two
# escalation valves below exit the process with code 3 for the supervisor.
watchdog:
  stall_timeout_s: 2.0
  retry: {base_s: 0.5, cap_s: 15.0}
  max_outage_s: null       # outage seconds before giving up (null = never)
  max_zombie_readers: 3    # hung reader threads = wedged USB stack signature

motion:
  algorithm: framediff   # framediff | mog2
  downscale_width: 160
  diff_threshold: 12
  min_area_frac: 0.01
  open_frames: 3   # a 1-frame blip makes 2 active diffs; 3 debounces it
  quiet_frames: 8
  roi_pad_px: 32

decode:
  symbology_priority: [qr, datamatrix]
  frame_budget_ms: 50.0
  dm_timeout_ms: 40
  executor: thread       # thread | process (see tools/bench_decoders.py)
  workers: 2
  fallback_after_frames: 4
  confirmations: 1

dedup:
  window_s: 12.0

buffer:
  pre_s: 2.0
  post_s: 2.0

evidence:
  dir: data/evidence
  frame_stride: 3
  jpeg_quality: 85
  max_total_mb: 500.0
  max_age_days: 14.0

sinks:
  console: {enabled: true}
  jsonl: {enabled: true, path: data/events.jsonl}
  sqlite: {enabled: true, path: data/palletscan.db}
  # Store-and-forward HTTP POST (offline-first). One event per POST, 2xx
  # acks, at-least-once delivery — receivers dedupe on event_id. Start
  # `python tools/echo_server.py` for a localhost test endpoint.
  http:
    enabled: false
    url: "http://127.0.0.1:8808/events"
    headers: {}            # e.g. {Authorization: "Bearer ..."}
    timeout_s: 5.0
    outbox_path: data/outbox.db
    retry: {base_s: 1.0, cap_s: 60.0}
    max_mb: 200.0          # outbox caps; oldest pruned first, counted+logged
    max_age_days: 14.0

metrics:
  window_s: 60.0        # wall-clock window for the fps rate
  latency_samples: 2048 # decode wall-time reservoir size

logging:
  level: INFO
